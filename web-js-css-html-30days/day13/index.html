<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>Day 13 · 折叠面板</title><style>body{font-family:system-ui;background:#f0f4f8;margin:0;padding:40px}.box{max-width:500px;margin:0 auto}.item{background:#fff;border-radius:8px;margin-bottom:8px;overflow:hidden}.hd{padding:14px 18px;cursor:pointer}.bd{max-height:0;overflow:hidden;transition:max-height .3s;padding:0 18px}.item.op .bd{max-height:100px;padding:0 18px 14px}</style></head><body><div class="box" id="b"><div class="item"><div class="hd">什么是 HTML？</div><div class="bd">超文本标记语言，描述结构。</div></div><div class="item"><div class="hd">什么是 CSS？</div><div class="bd">层叠样式表，控制外观。</div></div><div class="item"><div class="hd">什么是 JS？</div><div class="bd">JavaScript，让网页交互。</div></div></div><script>document.getElementById("b").addEventListener("click",e=>{const h=e.target.closest(".hd");if(h)h.parentElement.classList.toggle("op")})</script></body></html>
