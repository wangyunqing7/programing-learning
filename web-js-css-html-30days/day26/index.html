<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>Day 26 · 购物清单</title><style>body{font-family:system-ui;background:#f0f4f8;margin:0;padding:40px}.box{max-width:400px;margin:0 auto;background:#fff;padding:24px;border-radius:12px}input{padding:8px;border:1px solid #cbd5e1;border-radius:6px}button{padding:8px 14px;background:#0f5cc0;color:#fff;border:none;border-radius:6px;cursor:pointer}.item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}.del{background:#ef4444;padding:2px 8px}.total{text-align:right;font-size:20px;font-weight:bold;color:#0f5cc0;margin-top:12px}</style></head><body><div class="box"><h2>购物清单</h2><input id="n" placeholder="商品"><input id="p" type="number" placeholder="价格" style="width:80px"><button onclick="add()">加</button><div id="l"></div><div class="total" id="tt">合计：¥0</div></div><script>let it=[];function r(){document.getElementById("l").innerHTML=it.map((x,i)=>'<div class="item"><span>'+x.n+" ¥"+x.p+'</span><button class="del" onclick="dl('+i+')">×</button></div>').join("");document.getElementById("tt").textContent="合计：¥"+it.reduce((s,x)=>s+x.p,0)}function add(){const n=document.getElementById("n").value.trim(),p=parseFloat(document.getElementById("p").value);if(n&&p){it.push({n:n,p:p});document.getElementById("n").value="";document.getElementById("p").value="";r()}}function dl(i){it.splice(i,1);r()}it=[{n:"苹果",p:12},{n:"牛奶",p:8}];r()</script></body></html>
