<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>Day 02 · 计数器</title><style>body{font-family:system-ui;background:#f0f4f8;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.box{background:#fff;padding:40px;border-radius:16px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.1)}#count{font-size:72px;font-weight:bold;color:#0f5cc0;margin:16px 0}button{font-size:24px;width:56px;height:56px;margin:0 8px;border:none;border-radius:50%;background:#0f5cc0;color:#fff;cursor:pointer}button:hover{background:#0b4a99}</style></head><body><div class="box"><h2>计数器</h2><div id="count">0</div><button id="minus">-</button><button id="plus">+</button></div><script>let c=0;const d=document.getElementById("count");const u=()=>d.textContent=c;document.getElementById("plus").addEventListener("click",()=>{c++;u()});document.getElementById("minus").addEventListener("click",()=>{c--;u()})</script></body></html>
