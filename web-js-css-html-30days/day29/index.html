<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>Day 29 · 看板</title><style>body{font-family:system-ui;background:#f0f4f8;margin:0;padding:20px}.board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:900px;margin:0 auto}.col{background:#e2e8f0;border-radius:12px;padding:16px;min-height:200px}.col h3{margin:0 0 12px;color:#475569}.task{background:#fff;padding:12px;border-radius:8px;margin-bottom:8px;border-left:4px solid #0f5cc0}.task button{float:right;background:none;border:none;cursor:pointer;color:#0f5cc0;font-size:16px}</style></head><body><div class="board" id="b"></div><script>const cols=[{t:"待办",items:["设计页面","写文档"]},{t:"进行中",items:["开发功能"]},{t:"完成",items:["需求分析"]}];function r(){document.getElementById("b").innerHTML=cols.map((c,ci)=>'<div class="col"><h3>'+c.t+" ("+c.items.length+")</h3>"+c.items.map((it,ii)=>'<div class="task">'+it+'<button onclick="mv('+ci+","+ii+')">→</button></div>').join("")+"</div>").join("")}function mv(ci,ii){const t=cols[ci].items.splice(ii,1)[0];cols[(ci+1)%3].items.push(t);r()}r()</script></body></html>
