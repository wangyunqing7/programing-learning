<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>Day 07 · 进度条</title><style>body{font-family:system-ui;background:#f0f4f8;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.box{background:#fff;padding:40px;border-radius:12px;width:360px;text-align:center}.track{background:#e2e8f0;border-radius:999px;height:24px;overflow:hidden;margin:16px 0}.fill{background:linear-gradient(90deg,#0f5cc0,#0d9488);height:100%;width:0;transition:width .3s}button{padding:8px 20px;background:#0f5cc0;color:#fff;border:none;border-radius:6px;cursor:pointer}</style></head><body><div class="box"><h2>下载进度</h2><div class="track"><div class="fill" id="f"></div></div><div id="lb">0%</div><button onclick="go()">开始</button></div><script>let p=0,t=null;const f=document.getElementById("f"),lb=document.getElementById("lb");function go(){p=0;clearInterval(t);t=setInterval(()=>{p+=Math.random()*15;if(p>=100){p=100;clearInterval(t)}f.style.width=p+"%";lb.textContent=Math.floor(p)+"%"},200)}</script></body></html>
